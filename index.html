<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>JS Game</title>
</head>

<body>

    <div class="container">
        <div class="container__conteudo">
            <div class="container__informacoes">
                <p id ="contador-vitorias"></p>
                <div class="container__texto">
                    <h1></h1>
                    <p id="subtitulo" class="texto__paragrafo"></p><br>
                </div>
                <input type="number" class="container__input">
                <div class="chute container__botoes">
                    <button onclick="verificarChute()" id ="botao-chute" class="container__botao">Chutar</button>
                    <button onclick="reiniciarJogo()" id="reiniciar" class="container__botao " disabled>Novo jogo</button>
                </div>
                <div class="container__dificuldade">
                <p>Dificuldade:</p>
                <div class="botoes-dificuldade">
                    <button onclick="definirDificuldade(1,10)" class="botao-facil">Fácil</button>
                    <button onclick="definirDificuldade(2,50)" id="medio" class="botao-medio" disabled>Médio</button>
                    <button onclick="definirDificuldade(3,100)" id="dificil" class="botao-dificil" disabled>Difícil</button>
                </div>
            </div>
            </div>
    </div>




    <script src="app.js" defer></script>
</body>

</html>
